name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version in manifest
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/embymediafork/manifest.json > tmp.json
          mv tmp.json custom_components/embymediafork/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/embymediafork/manifest.json
          git commit -m "chore: bump version to ${{ github.event.release.tag_name }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create release zip
        run: |
          cd custom_components/embymediafork
          zip -r ../../embymediafork.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: embymediafork.zip
